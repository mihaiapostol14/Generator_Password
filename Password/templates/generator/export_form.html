{% extends 'base.html' %}
{% load static %}

{% block content %}

<!-- Button trigger modal -->
<button type="button" class="btn custom-btn-secondary" data-bs-toggle="modal" data-bs-target="#exportModal">
  Export
</button>


<!-- Modal Structure -->
<div class="modal fade" id="exportModal" tabindex="-1" aria-labelledby="exportModalLabel" aria-hidden="true">
<div class="modal-dialog modal-dialog-centered">
  <div class="modal-content custom-modal">
    <div class="modal-header">
      <h5 class="modal-title" id="exportModalLabel">Export Data</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">
      <form action="{% url 'generator:export' %}" method="POST">
        {% csrf_token %}
        {{form.file_format}}
        <div class="modal-footer">
          <button type="submit" class="btn custom-btn">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
</div>


<link rel="stylesheet" href="{% static 'main/css/home.css' %}">
<script type="text/javascript" src="{% static 'main/js/home.js' %}"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
{% endblock %}
