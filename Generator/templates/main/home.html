{% extends 'base.html' %}
{% load static %}

{% block content %}
<!--{% include 'includes/message.html' %}-->
<body class="bg-dark-subtle d-flex min-vh-100 justify-content-center align-items-center">
    <div class="container bg-light">
      <div class="title text-uppercase text-center p-2">Generator Password</div>
    <form action="{%url 'generator'%}" method="POST">
        {% csrf_token %}
  <div class="form-group">
    <label for="countSymbols">{{form.count_symbol.label_tag}}</label>
      {{form.count_symbol}}
    <small id="countSymbols" class="form-text text-muted">count symbols</small>
  </div>
  <div class="form-group position-relative">
    <i class="copy-icon fa-solid fa-copy fa-lg position-absolute end-0 me-2 mt-5"></i>
    <label for="ShowPassword">{{form.show_password.label_tag}}</label>
    {{form.show_password}}
  </div>
  <div class="d-grid gap-2 d-md-block justify-content-center text-center p-2">
  <button class="btn btn-primary" type="submit">Generate</button>
</div>
</form>
<!--        {% include './export_form.html' %} this option is disabled in the moment  -->
    </div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<link rel="stylesheet" href="{% static 'main/css/home.css' %}">
<script type="text/javascript" src="{% static 'main/js/home.js' %}"></script>
{% endblock %}
